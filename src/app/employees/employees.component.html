<table class="w-full border-collapse rounded-2xl overflow-hidden shadow-lg">
  <thead class="bg-gray-100">
    <tr>
      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Name"
          propertyName="name"
          [sortable]="true"
          [filterable]="true"
          (filterChange)="onFilterChange($event)"
        ></app-table-header-cell>
      </th>

      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Role"
          propertyName="role"
          [sortable]="true"
          [filterable]="true"
          (filterChange)="onFilterChange($event)"
        ></app-table-header-cell>
      </th>

      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Status"
          propertyName="status"
          [sortable]="true"
        ></app-table-header-cell>
      </th>

      <th class="text-right px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        Actions
      </th>
    </tr>
  </thead>

  <tbody>
    @for (
      employee of employees().slice(pageIndex() * pageSize(), (pageIndex() + 1) * pageSize());
      track employee.id
    ) {
      <tr
        class="transition-colors duration-200 hover:bg-gray-50"
        [class]="employee.status === 'active' ? 'active' : 'inactive'"
      >
        <td class="px-6 py-4 text-sm text-gray-600 border-t">
          {{ employee.name }}
        </td>

        <td class="px-6 py-4 text-sm text-gray-600 border-t">
          {{ employee.role }}
        </td>

        <td class="px-6 py-4 text-sm border-t">
          <span
            class="active px-2 py-1 rounded-lg text-xs font-medium"
            [class]="employee.status === 'active' ? 'active' : 'inactive'"
          >
            {{ employee.status }}
          </span>
        </td>

        <!-- Actions Buttons -->
        <td class="px-6 py-4 border-t text-right">
          <app-actions-row
            (expand)="employee.expanded = !employee.expanded"
            (edit)="onEdit(employee.id)"
            (delete)="onDelete(employee.id)"
          ></app-actions-row>
        </td>
      </tr>

      <!-- Expanded Details Row -->
      <tr class="bg-gray-50" [style]="employee.expanded ? 'display: table-row' : 'display: none'">
        <td colspan="4" class="px-6 py-4 border-t">
          <app-details-row [details]="getDetails(employee)" />
        </td>
      </tr>
    }
  </tbody>
</table>

<!-- Pagination -->
<div class="flex items-center justify-center gap-2 mt-6">
  <mat-paginator
    [length]="employees().length"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[5, 10, 20, 50]"
    (page)="changePage($event)"
  ></mat-paginator>
</div>
