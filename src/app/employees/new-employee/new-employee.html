<form
  [formGroup]="form"
  (ngSubmit)="onSubmit()"
  class="max-w-xl mx-auto p-6 bg-white rounded-2xl shadow-md space-y-6"
>
  <app-form-input
    [label]="'Name'"
    [control]="form.controls['name']"
    [errorMessage]="'Name is required'"
  />

  <app-form-input
    [label]="'Department'"
    [control]="form.controls['department']"
    [errorMessage]="'Department is required'"
  />

  <app-form-datepicker
    [label]="'Starting date'"
    [control]="form.controls['startDate']"
    [errorMessage]="'Starting date is required'"
  />

  <div class="flex items-center gap-3 px-1">
    <app-form-checkbox
      [title]="'Active'"
      [control]="form.controls['status']"
    />
  </div>

  <!-- Buttons -->
  <div class="flex justify-end gap-3 pt-2">
    <button
      (click)="onCancel()"
      type="button"
      class="px-5 py-2 rounded-xl border border-gray-300 text-gray-700 hover:bg-gray-100 transition"
    >
      Cancel
    </button>

    <button
      type="submit"
      class="px-5 py-2 rounded-xl bg-blue-600 text-white hover:bg-blue-700 transition"
      [disabled]="form.invalid"
    >
      Submit
    </button>
  </div>
</form>
