<table class="w-full border-collapse rounded-2xl overflow-hidden shadow-lg">
  <thead class="bg-gray-100">
    <tr>
      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Name"
          propertyName="name"
          [sortable]="true"
          [filterable]="true"
          (filterChange)="onFilterChange($event)"
        ></app-table-header-cell>
      </th>

      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Location"
          propertyName="location"
          [sortable]="true"
          [filterable]="true"
          (filterChange)="onFilterChange($event)"
        ></app-table-header-cell>
      </th>

      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Description"
          propertyName="description"
          [sortable]="true"
          [filterable]="true"
          (filterChange)="onFilterChange($event)"
        ></app-table-header-cell>
      </th>

      <th class="text-right px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        Actions
      </th>
    </tr>
  </thead>

  <tbody>
    @for (
      department of departments().slice(pageIndex() * pageSize(), (pageIndex() + 1) * pageSize());
      track department.id
    ) {
      <tr class="transition-colors duration-200 hover:bg-gray-50">
        <td class="px-6 py-4 text-sm text-gray-600 border-t">
          {{ department.name }}
        </td>

        <td class="px-6 py-4 text-sm text-gray-600 border-t">
          {{ department.location }}
        </td>

        <td class="px-6 py-4 text-sm text-gray-600 border-t max-w-xs">
          <span class="block truncate" [title]="department.description">
            {{ department.description }}
          </span>
        </td>

        <!-- Actions Buttons -->
        <td class="px-6 py-4 border-t text-right">
          <app-actions-row
            (expand)="department.expanded = !department.expanded"
            (edit)="onEdit(department.id)"
            (delete)="onDelete(department.id)"
          ></app-actions-row>
        </td>
      </tr>

      <!-- Expanded Details Row -->
      <tr class="bg-gray-50" [style]="department.expanded ? 'display: table-row' : 'display: none'">
        <td colspan="4" class="px-6 py-4 border-t">
          <app-details-row [details]="getDetails(department)" />
        </td>
      </tr>
    }
  </tbody>
</table>

<!-- Pagination -->
<div class="flex items-center justify-center gap-2 mt-6">
  <mat-paginator
    [length]="departments().length"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[5, 10, 20, 50]"
    (page)="changePage($event)"
  ></mat-paginator>
</div>
