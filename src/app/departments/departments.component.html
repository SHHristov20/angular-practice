<table class="w-full border-collapse rounded-2xl overflow-hidden shadow-lg">
  <thead class="bg-gray-100">
    <tr>
      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Name"
          propertyName="name"
          [sortable]="true"
          [filterable]="true"
          (filterChange)="onFilterChange($event)"
        ></app-table-header-cell>
      </th>

      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Department"
          propertyName="department"
          [sortable]="true"
          [filterable]="true"
          (filterChange)="onFilterChange($event)"
        ></app-table-header-cell>
      </th>

      <th class="text-left px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        <app-table-header-cell
          label="Status"
          propertyName="status"
          [sortable]="true"
        ></app-table-header-cell>
      </th>

      <th class="text-right px-6 py-3 text-sm font-semibold text-gray-700 uppercase tracking-wide">
        Actions
      </th>
    </tr>
  </thead>

  <tbody>
    @for (
      department of departments().slice(pageIndex() * pageSize(), (pageIndex() + 1) * pageSize());
      track department.id
    ) {
      <tr
        class="transition-colors duration-200 hover:bg-gray-50"
        [class]="department.name === 'active' ? 'active' : 'inactive'"
      >
        <td class="px-6 py-4 text-sm text-gray-600 border-t">
          {{ department.name }}
        </td>

        <td class="px-6 py-4 text-sm text-gray-600 border-t">
          {{ department.name }}
        </td>

        <td class="px-6 py-4 text-sm border-t">
          <span
            class="active px-2 py-1 rounded-lg text-xs font-medium"
            [class]="department.name === 'active' ? 'active' : 'inactive'"
          >
            {{ department.name }}
          </span>
        </td>

        <!-- Actions Buttons -->
        <td class="px-6 py-4 border-t text-right">
          <div class="flex items-center justify-end gap-2">
            <!-- Expand Button -->
            <button
              type="button"
              class="p-2 rounded-lg hover:bg-gray-100 text-gray-600 transition"
              title="Expand"
              (click)="department.expanded = !department.expanded"
            >
              <!-- Expand Icon -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  [attr.d]="department.expanded ? 'M5 15l7-7 7 7' : 'M19 9l-7 7-7-7'"
                />
              </svg>
            </button>
            <!-- Edit Button -->
            <button
              routerLink="/departments/edit/{{ department.id }}"
              class="p-2 rounded-lg hover:bg-blue-100 text-blue-600 transition"
              title="Edit"
            >
              <!-- Pencil Icon -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M11 5h2m-1-1v2m-6 12h12a2 2 0 002-2V9.828a2 2 0 00-.586-1.414l-3.828-3.828A2 2 0 0014.172 4H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                />
              </svg>
            </button>

            <!-- Delete Button -->
            <button
              (click)="onDelete(department.id)"
              class="p-2 rounded-lg hover:bg-red-100 text-red-600 transition"
              title="Delete"
            >
              <!-- Trash Icon -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 7h12M9 7v10m6-10v10M5 7l1 12a2 2 0 002 2h8a2 2 0 002-2l1-12M10 11v6m4-6v6M9 4h6a1 1 0 011 1v2H8V5a1 1 0 011-1z"
                />
              </svg>
            </button>
          </div>
        </td>
      </tr>

      <!-- Expanded Details Row -->
      <tr class="bg-gray-50" [style]="department.expanded ? 'display: table-row' : 'display: none'">
        <td colspan="4" class="px-6 py-4 border-t">
          <!-- <app-details-row [details]="departmentService.getDetails(department)" /> -->
        </td>
      </tr>
    }
  </tbody>
</table>
