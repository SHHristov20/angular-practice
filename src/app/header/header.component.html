<header class="bg-white shadow-md rounded-2xl mb-6 px-6 py-4 flex items-center justify-between">
  <h1 class="text-xl font-semibold text-gray-800" routerLink="/">Employee Management</h1>

  <nav class="flex items-center gap-2 text-sm">
    <button appSecondaryButton routerLink="/employees" routerLinkActive="text-blue-600 font-medium">
      Employees
    </button>

    <button
      appSecondaryButton
      routerLink="/departments"
      routerLinkActive="text-blue-600 font-medium"
    >
      Departments
    </button>
  </nav>

  <div class="flex items-center gap-3">
    @switch (router.url.split('?')[0]) {
      @case ('/employees') {
        <button appPrimaryButton routerLink="/employees/new">Add Employee</button>
      }

      @case ('/departments') {
        <button appPrimaryButton routerLink="/departments/new">Add Department</button>
      }
    }
  </div>
</header>
