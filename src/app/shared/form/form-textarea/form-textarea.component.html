<mat-form-field class="w-full">
  <mat-label>{{ label() }}</mat-label>
  <textarea matInput class="w-full" rows="5" [formControl]="control()"></textarea>

  @if (control().invalid && control().touched) {
    <mat-error class="text-xs">{{ errorMessage() ? errorMessage() : label() + ' is required.' }}</mat-error>
  }
</mat-form-field>
