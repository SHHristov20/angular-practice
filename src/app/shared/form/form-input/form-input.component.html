<mat-form-field class="w-full">
  <mat-label>{{ label() }}</mat-label>
  <input matInput class="w-full" [formControl]="control()" />

  @if (control().invalid && control().touched) {
    <mat-error class="text-xs">{{ errorMessage() ? errorMessage() : label() + ' is required.' }}</mat-error>
  }
</mat-form-field>
